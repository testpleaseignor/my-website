<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chibi penguin girl</title>
    <!-- 袩芯写泻谢褞褔邪械屑 Tailwind CSS 写谢褟 泻褉邪褋懈胁芯谐芯 芯褎芯褉屑谢械薪懈褟 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* 袦褟谐泻懈泄 谐褉邪写懈械薪褌 薪邪 褎芯薪械 */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 font-sans text-gray-800">

    <!-- 袚谢邪胁薪褘泄 泻芯薪褌械泄薪械褉 (泻邪褉褌芯褔泻邪) -->
    <main class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-6 sm:p-10 text-center space-y-8">
        
        <header>
            <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 tracking-tight">
                Chibi Penguin Girl
            </h1>
        </header>

        <!-- 袣芯薪褌械泄薪械褉 写谢褟 懈蟹芯斜褉邪卸械薪懈褟 -->
        <div class="relative rounded-2xl overflow-hidden border border-gray-100 shadow-inner bg-gray-50 flex justify-center items-center p-4">
            <!-- 
              袗褌褉懈斜褍褌 src 褍泻邪蟹褘胁邪械褌 薪邪 褎邪泄谢 泻邪褉褌懈薪泻懈.
              袙邪卸薪芯: 锌褉懈 蟹邪谐褉褍蟹泻械 薪邪 GitHub 褍斜械写懈褌械褋褜, 褔褌芯 泻邪褉褌懈薪泻邪 薪邪蟹褘胁邪械褌褋褟 褌芯褔薪芯 褌邪泻 卸械 懈 谢械卸懈褌 胁 褌芯泄 卸械 锌邪锌泻械, 褔褌芯 懈 index.html
            -->
            <img 
                src="chibi%20penguin%20girl.png" 
                alt="Chibi Penguin Girl Reference" 
                onerror="this.onerror=null; this.src='https://placehold.co/600x600/f3f4f6/a1a1aa.png?text=袣邪褉褌懈薪泻邪+薪械+薪邪泄写械薪邪%5Cn袩芯谢芯卸懈褌械+褎邪泄谢+褋+泻邪褉褌懈薪泻芯泄%5Cn胁+芯写薪褍+锌邪锌泻褍+褋+index.html'"
                class="w-full h-auto max-h-[70vh] object-contain rounded-xl transition-transform duration-500 hover:scale-[1.01]"
            >
        </div>

        <!-- 袣薪芯锌泻邪 褋泻邪褔懈胁邪薪懈褟 -->
        <div>
            <a 
                href="chibi%20penguin%20girl.png" 
                download="chibi penguin girl.png"
                class="inline-flex items-center justify-center px-8 py-4 text-lg font-semibold text-white bg-indigo-600 rounded-full hover:bg-indigo-700 transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-300"
            >
                <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                小泻邪褔邪褌褜 懈蟹芯斜褉邪卸械薪懈械
            </a>
        </div>

    </main>

</body>
</html>
