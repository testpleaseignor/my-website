<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chibi penguin girl</title>
    <!-- Подключаем Tailwind CSS для красивого оформления -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Настройка Tailwind для поддержки темной темы через классы -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- Скрипт для предварительной загрузки темы (чтобы избежать мерцания при загрузке) -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 font-sans text-gray-800 dark:text-gray-200 bg-gradient-to-br from-gray-50 to-gray-200 dark:from-gray-900 dark:to-gray-800 transition-colors duration-300 relative">

    <!-- Главный контейнер (карточка) -->
    <main class="relative max-w-5xl w-full bg-white dark:bg-gray-800 rounded-3xl shadow-2xl dark:shadow-gray-900/50 overflow-hidden p-6 pt-16 sm:p-10 sm:pt-16 text-center space-y-8 transition-colors duration-300">
        
        <header class="relative flex items-center justify-center gap-3 sm:gap-4">
            
            <!-- Ссылка-логотип (SVG) слева от заголовка -->
            <a href="https://github.com/testpleaseignor/testpleaseignor.github.io" class="flex-shrink-0 hover:scale-110 transition-transform duration-300 focus:outline-none focus:ring-4 focus:ring-indigo-300 dark:focus:ring-indigo-800 rounded-full" title="Перейти на GitHub">
                <img src="chibi%20penguin%20girl%20svg1.svg" alt="GitHub Link" class="w-10 h-10 sm:w-12 sm:h-12 object-contain">
            </a>

            <!-- Заголовок -->
            <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight transition-colors duration-300">
                Chibi Penguin Girl
            </h1>
            
            <!-- Кнопка переключения темы (справа) -->
            <button id="theme-toggle" type="button" class="absolute right-0 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-full text-sm p-3 transition-colors duration-300 shadow-sm">
                <!-- Иконка луны (показывается в светлой теме) -->
                <svg id="theme-toggle-dark-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                </svg>
                <!-- Иконка солнца (показывается в темной теме) -->
                <svg id="theme-toggle-light-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
                </svg>
            </button>
        </header>

        <!-- Контейнер для изображения -->
        <div class="relative rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-inner bg-gray-50 dark:bg-gray-900 flex justify-center items-center p-4 transition-colors duration-300">
            <!-- Главная картинка -->
            <img 
                src="chibi%20penguin%20girl.png" 
                alt="Chibi Penguin Girl Reference" 
                onerror="this.onerror=null; this.src='https://placehold.co/600x600/f3f4f6/a1a1aa.png?text=Картинка+не+найдена%5CnПоложите+файл+с+картинкой%5Cnв+одну+папку+с+index.html'"
                class="w-full h-auto max-h-[70vh] object-contain rounded-xl transition-transform duration-500 hover:scale-[1.01]"
            >
        </div>

        <!-- Кнопка скачивания -->
        <div>
            <a 
                href="chibi%20penguin%20girl.png" 
                download="chibi penguin girl.png"
                class="inline-flex items-center justify-center px-8 py-4 text-lg font-semibold text-white bg-indigo-600 rounded-full hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 dark:hover:shadow-indigo-400/30 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-300 dark:focus:ring-indigo-800"
            >
                <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Скачать изображение
            </a>
        </div>

    </main>

    <!-- Скрипт для работы переключателя тем -->
    <script>
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Показываем нужную иконку при загрузке страницы
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        var themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            // Переключаем иконки
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // Если тема была установлена через localStorage
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            // Если темы в localStorage еще нет, опираемся на системную
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
